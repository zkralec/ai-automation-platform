services:
  postgres:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7
    env_file: .env
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  adminer:
    image: adminer
    profiles: ["ops"]
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    environment:
      TASK_RUN_HISTORY_DB_PATH: /data/task_run_history.sqlite3
      AI_USAGE_DB_PATH: /data/task_run_history.sqlite3
      EVENT_LOG_DB_PATH: /data/task_run_history.sqlite3
      SYSTEM_METRICS_DB_PATH: /data/task_run_history.sqlite3
      AGENT_HEARTBEAT_DB_PATH: /data/task_run_history.sqlite3
      CANDIDATE_PROFILE_DB_PATH: /data/task_run_history.sqlite3
      DAILY_OPS_REPORT_DB_PATH: /data/task_run_history.sqlite3
      DEAL_ALERT_STATE_DB_PATH: /data/task_run_history.sqlite3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "runtime_healthcheck.py", "api", "--url", "http://127.0.0.1:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      WORKER_NAME: worker
      TASK_RUN_HISTORY_DB_PATH: /data/task_run_history.sqlite3
      AI_USAGE_DB_PATH: /data/task_run_history.sqlite3
      EVENT_LOG_DB_PATH: /data/task_run_history.sqlite3
      SYSTEM_METRICS_DB_PATH: /data/task_run_history.sqlite3
      AGENT_HEARTBEAT_DB_PATH: /data/task_run_history.sqlite3
      CANDIDATE_PROFILE_DB_PATH: /data/task_run_history.sqlite3
      DAILY_OPS_REPORT_DB_PATH: /data/task_run_history.sqlite3
      DEAL_ALERT_STATE_DB_PATH: /data/task_run_history.sqlite3
    command: ["python", "worker/heartbeat_supervisor.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "api/runtime_healthcheck.py", "heartbeat", "--agent", "worker"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    environment:
      SCHEDULER_NAME: scheduler
      TASK_RUN_HISTORY_DB_PATH: /data/task_run_history.sqlite3
      AI_USAGE_DB_PATH: /data/task_run_history.sqlite3
      EVENT_LOG_DB_PATH: /data/task_run_history.sqlite3
      SYSTEM_METRICS_DB_PATH: /data/task_run_history.sqlite3
      AGENT_HEARTBEAT_DB_PATH: /data/task_run_history.sqlite3
      CANDIDATE_PROFILE_DB_PATH: /data/task_run_history.sqlite3
      DAILY_OPS_REPORT_DB_PATH: /data/task_run_history.sqlite3
      DEAL_ALERT_STATE_DB_PATH: /data/task_run_history.sqlite3
    command: ["python", "scheduler.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "runtime_healthcheck.py", "heartbeat", "--agent", "scheduler"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
